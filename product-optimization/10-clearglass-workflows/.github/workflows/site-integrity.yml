name: Site integrity

on:
  push:
    branches: [main]
    paths:
      - '**.html'
      - '**.md'
      - '**.markdown'
      - '_config.yml'
      - '_data/**'
      - '_includes/**'
      - '_layouts/**'
      - '_posts/**'
      - 'assets/**'
      - 'Gemfile*'
      - '.github/workflows/site-integrity.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.html'
      - '**.md'
      - '**.markdown'
      - '_config.yml'
      - '_data/**'
      - '_includes/**'
      - '_layouts/**'
      - '_posts/**'
      - 'assets/**'
      - 'Gemfile*'
      - '.github/workflows/site-integrity.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-integrity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec jekyll build

      - name: HTML proofing (links, images, scripts)
        run: bundle exec htmlproofer ./_site \
          --disable-external \
          --allow-hash-href \
          --ignore-empty-alt
        continue-on-error: false
