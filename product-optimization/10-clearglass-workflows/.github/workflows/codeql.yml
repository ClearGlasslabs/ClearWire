name: CodeQL

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'assets/**'
      - '_posts/**'
      - '_drafts/**'
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — keeps the security tab fresh without
    # wasting minutes on every push.
    - cron: '0 6 * * 1'

permissions:
  contents: read
  actions: read
  security-events: write
  packages: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Adjust this list to whatever GitHub auto-detects for the repo.
        # If the site is pure Jekyll/HTML/CSS, drop python and keep only
        # javascript-typescript (or remove this workflow entirely — see
        # README).
        language: [javascript-typescript, python]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
