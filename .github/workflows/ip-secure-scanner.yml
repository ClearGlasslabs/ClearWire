name: IP-Secure Scanner

on:
  push:
    branches:
      - main
      - develop
      - staging
      - ip-secure-scanner-bot
  pull_request:
    branches:
      - main
      - develop
      - staging

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  ip-secure-scan:
    name: IP / Security / Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4.3
          bundler-cache: false

      - name: Create audit directory
        run: mkdir -p audit

      - name: Scan for secrets
        env:
          SECRET_PATTERN: '(AKIA[0-9A-Z]{16}|gh[pousr]_[A-Za-z0-9]{36,}|sk-[A-Za-z0-9]{32,}|-----BEGIN( RSA)? PRIVATE KEY-----)'
        run: |
          echo '{"event":"secret_scan","status":"running"}' > audit/secret_scan.json

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only --diff-filter=ACMR HEAD^1 HEAD)
          elif git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            files=$(git diff --name-only --diff-filter=ACMR "${{ github.event.before }}" "${{ github.sha }}")
          else
            files=$(git diff --name-only --diff-filter=ACMR HEAD^1 HEAD 2>/dev/null || true)
          fi

          files=$(printf '%s\n' "$files" | grep -vE '^(node_modules/|package-lock\.json$|Gemfile\.lock$)' || true)

          if [ -z "$files" ]; then
            echo 'No changed files to scan'
            exit 0
          fi

          matches=$(printf '%s\n' "$files" | while IFS= read -r file; do
            [ -f "$file" ] || continue
            grep -HInE "$SECRET_PATTERN" "$file" || true
          done)

          if [ -n "$matches" ]; then
            printf '%s\n' "$matches"
            echo 'Potential secrets detected in changed files'
            exit 1
          fi
          echo 'No secrets detected'

      - name: Verify npm dependencies
        run: |
          npm audit --audit-level=high || true
          npm ls >/dev/null || true

      - name: Verify Ruby dependencies
        run: |
          bundle install --jobs 4 --retry 2 || true
          bundle audit check --update || true

      - name: License and provenance review
        run: |
          echo '{"event":"license_review","status":"running"}' > audit/license_review.json
          find . -type f \( -name '*.js' -o -name '*.ts' -o -name '*.rb' -o -name '*.py' \) \
            -not -path './node_modules/*' -print0 \
            | while IFS= read -r -d '' file; do
                if head -20 "$file" | grep -Eiqw 'MIT|Apache|GPL|AGPL|BSD|MPL'; then
                  echo "License reference found in $file"
                fi
              done
          echo 'License review complete'

      - name: Generate audit log
        run: |
          cat <<EOF > audit/ip-secure-audit.json
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "repository": "ClearGlasslabs/Clearwire",
            "branch": "${GITHUB_REF_NAME}",
            "scanner": "IP-Secure Scanner",
            "checks": [
              "secret_scan",
              "dependency_verification",
              "license_review",
              "asset_classification"
            ],
            "status": "completed"
          }
          EOF

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ip-secure-audit
          path: audit/
